<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Warm parchment background -->
  <rect width="64" height="64" rx="12" fill="#f5f0e8"/>
  <!-- Open notebook -->
  <g transform="translate(8,12)">
    <!-- left page -->
    <path d="M0 4 C0 2 2 0 4 0 L22 0 L24 4 L24 38 L4 38 C2 38 0 36 0 34 Z" fill="#ffffff" stroke="#1c2a3a" stroke-width="2" stroke-linejoin="round"/>
    <!-- right page -->
    <path d="M48 4 C48 2 46 0 44 0 L26 0 L24 4 L24 38 L44 38 C46 38 48 36 48 34 Z" fill="#ffffff" stroke="#1c2a3a" stroke-width="2" stroke-linejoin="round"/>
    <!-- spine -->
    <line x1="24" y1="4" x2="24" y2="38" stroke="#1c2a3a" stroke-width="2"/>
    <!-- left lines -->
    <line x1="6" y1="10" x2="20" y2="10" stroke="#9aa3ad" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="6" y1="16" x2="20" y2="16" stroke="#9aa3ad" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="6" y1="22" x2="18" y2="22" stroke="#9aa3ad" stroke-width="1.4" stroke-linecap="round"/>
    <!-- right page: tiny Danish flag accent -->
    <rect x="29" y="9" width="14" height="9" fill="#c8102e"/>
    <rect x="33" y="9" width="2" height="9" fill="#ffffff"/>
    <rect x="29" y="13" width="14" height="2" fill="#ffffff"/>
  </g>
</svg>
